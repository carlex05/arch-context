schemaVersion: "1.0"
solution:
  id: travel-booking-platform
  name: Travel Booking Platform
  description: >
    Multi-repository platform for searching trips, creating bookings, taking payments,
    and managing customer self-service changes.
principles:
  - id: domain-boundaries-first
    title: Domain boundaries first
    description: >
      Repository ownership follows bounded contexts so application and data changes
      remain aligned with business capabilities.
  - id: explicit-integration-contracts
    title: Explicit integration contracts
    description: >
      Cross-repository changes must document API events, synchronous contracts, and
      compatibility constraints before implementation starts.
